spring.application.name=varzea-stats
# Em containers pequenos (ex.: Railway free), true atrasa inicialização de beans até o primeiro uso.
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:false}

# Carrega sobrescritas locais (para dev) se o arquivo existir.
# Use para SMTP/e-mails sem precisar configurar variáveis no debug.
spring.config.import=optional:classpath:application-local.properties

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- PostgreSQL: deixe UMA linha spring.datasource.url ativa (comente a outra) ---
# Docker (compose-local ou stack): Postgres no host em 127.0.0.1:5433 (mapeamento 5433 -> 5432 no container)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/varzea}

# Postgres instalado na máquina (sem Docker), porta padrão 5432: comente a linha acima e descomente a de baixo
#spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/varzea

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
# Perfil enxuto para Railway free (ajustável por variável de ambiente)
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:60000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:600000}

server.port=${PORT:8080}

# Upload de logomarca da pelada (PNG, JPEG, GIF, WebP; máx. 2 MB)
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB
varzea.pelada-logo.upload-dir=${VARZEA_PELADA_LOGO_DIR:./data/pelada-logos}
varzea.payment-receipt.upload-dir=${VARZEA_PAYMENT_RECEIPT_DIR:./data/payment-receipts}

jwt.secret=${JWT_SECRET:varzea-stats-dev-secret-key-min-256-bits-change-in-production-please}
jwt.expiration-ms=86400000

# --- Actuator: health + probes (liveness/readiness) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
# Em produção sem SMTP configurado, não derruba o healthcheck do deploy.
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

# --- OpenAPI / Swagger UI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

# --- Usuario administrador inicial (apenas se nao existir usuario com este e-mail) ---
# Em producao: defina varzea.bootstrap.admin.enabled=false e crie usuarios por processo seguro.
varzea.bootstrap.admin.enabled=true
varzea.bootstrap.admin.email=admin@varzea.com
varzea.bootstrap.admin.password=admin123
varzea.bootstrap.admin.name=Administrador

# Senha inicial para usuários criados por administrador (devem alterar no primeiro acesso)
varzea.user.default-password=123456

# Link do frontend nas mensagens de recuperação de senha (new_music: FRONTEND_URL)
# No dev, o frontend roda na porta 3000 (vite.config.ts). Se você não setar FRONTEND_URL,
# usa este valor padrão para gerar links corretos.
varzea.password-reset.link-base=${FRONTEND_URL:http://localhost:3000}
varzea.mail.from=${VARZEA_MAIL_FROM:noreply@varzea.com}

# E-mail: sem SPRING_MAIL_HOST, redefinição de senha e cobrança financeira NÃO são enviadas (só log).
# Defina no ambiente: SPRING_MAIL_HOST, SPRING_MAIL_PORT (ex.: 587), SPRING_MAIL_USERNAME, SPRING_MAIL_PASSWORD
# e VARZEA_MAIL_FROM (remetente permitido pelo provedor, ex.: mesmo usuário SMTP).
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
# Evita requisição pendurada minutos se o SMTP não responder (valores em ms)
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT_MS:15000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT_MS:15000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT_MS:15000}
